# ═══════════════════════════════════════════════════════════════════════════════
# config/btc_5m_bot.yaml
#
# PURPOSE: Controls the BTC Up/Down 5-minute reversal trading bot.
#   - General behavior (poll interval, dataset path, model smoothing)
#   - Display settings (terminal dashboard)
#   - Trading settings (direction, tiers, position limits)
#   - Chainlink price source settings
#
# The bot monitors Polymarket's "BTC Up or Down 5m" market and uses a
# statistical reversal-probability model to decide when to buy Up/Down shares.
#
# SECRETS (in .env, not here):
#   POLYMARKET_PRIVATE_KEY      Your wallet private key
#   POLYMARKET_FUNDER_ADDRESS   Only for email/Magic wallets
#
# USAGE:
#   poetry run btc-5m-bot --config config/btc_5m_bot.yaml
# ═══════════════════════════════════════════════════════════════════════════════

# ─── General ──────────────────────────────────────────────────────────────────
general:
  # Master switch: false = run model + display only, no orders placed
  enabled: true
  # Seconds between each fetch-evaluate loop
  poll_interval_seconds: 2.0
  # Path to pre-computed reversal probability dataset (parquet)
  reversal_dataset_path: "data/crypto/btc/reversal_dataset.parquet"
  # Smoothing bandwidth for the delta axis (USD); higher = smoother model
  delta_bandwidth_usd: 50.0
  # Smoothing bandwidth for the time axis (seconds); higher = smoother model
  time_bandwidth_seconds: 30.0

  # ATR gate: skip trade if Normalized ATR > this % value (null = disabled)
  # NATR = (ATR / close) × 100. High NATR = volatile, low NATR = trending.
  # Recommended: 2.0–4.0 for BTC 5m. null disables the filter entirely.
  max_natr: null

  # ATR smoothing period (Wilder's EWM: alpha = 1/period)
  atr_period: 14

  # Directory where decision logs are saved (one CSV per session)
  log_dir: "output/logs"

  # Log every tick (not just trades/skips) — useful for deep backtest analysis
  # Warning: produces large files during long sessions
  log_every_tick: false

# ─── Price Sources ────────────────────────────────────────────────────────────
price_sources:
  # Primary: Chainlink Data Streams page (same source Polymarket uses)
  chainlink_streams_url: "https://data.chain.link/streams/btc-usd-cexprice-streams?timeframe=1minute"
  # Fallback: Polygon Chainlink on-chain feed address
  chainlink_polygon_address: "0xc907E116054Ad103354f2D350FD2514433D57F6f"
  # Polygon RPC endpoint for on-chain fallback
  polygon_rpc: "https://polygon-rpc.com"
  # Binance symbol for live price polling
  binance_symbol: "BTCUSDT"
  # Max attempts to capture price at window boundary
  boundary_retries: 3
  # Seconds between boundary capture retries
  boundary_retry_delay: 1.0

# ─── Display ──────────────────────────────────────────────────────────────────
display:
  # Show the terminal dashboard
  enabled: true
  # Show detailed per-tick information
  verbose: true
  # Clear screen between updates (set false if piping to logs)
  clear_screen: false

# ─── Trading ──────────────────────────────────────────────────────────────────
trading:
  # Execution mode: false = simulation only, true = live CLOB orders
  enabled: false

  # MAX_ENTRY_PRICE: skip a trade if the estimated Polymarket share price
  # exceeds this value. 1.0 = disabled (no cap).
  # Example: 0.72 means skip if we'd pay more than $0.72 per share.
  max_entry_price: 0.72

  # Probability tiers: defines the TARGET share count at each confidence level.
  # The bot uses a top-up approach: on each poll it finds the applicable tier
  # (lowest threshold P(rev) qualifies for) and tops-up to that tier's share count.
  # Example with tiers below: P(rev)=0.28 → buy 1; P(rev) drops to 0.05 → buy 2 more.
  tiers:
    - max_reversal_prob: 0.10   # P(rev) < 10% → 3 shares total
      shares: 3
    - max_reversal_prob: 0.20   # P(rev) < 20% → 2 shares total
      shares: 2
    - max_reversal_prob: 0.30   # P(rev) < 30% → 1 share total
      shares: 1
    # P(rev) >= 30% → no trade

  # Don't trade if fewer than this many seconds remain in the window
  min_seconds_remaining: 30
  # CLOB API signature type (0 = MetaMask/EOA, 1 = email/Magic)
  signature_type: 0


# ─── Time Filter ──────────────────────────────────────────────────────────────
# Controls when the bot is allowed to open new positions.
# Applied at both window-open time (skips entire window) and trade time.
time_filter:
  # Block Saturday and Sunday windows (UTC calendar day)
  exclude_weekends: false

  # Block windows outside NYSE trading hours: 09:30–16:00 ET (DST-aware)
  exclude_outside_nyse: false

  # Block windows on NYSE public holidays
  exclude_nyse_holidays: false

  sessions:
    # Enable session-based filtering
    enabled: false

    # ALLOW LIST: only trade during these sessions (others blocked).
    # Leave empty to use the block list instead.
    # Available: Asia, Europe, New_York, Overlap_EU_NY, Overlap_Asia_EU,
    #            New_York_Extended, All
    allowed_sessions: []
    # Examples:
    # allowed_sessions: ["New_York"]
    # allowed_sessions: ["Europe", "New_York"]

    # BLOCK LIST: never trade during these sessions.
    # Ignored if allowed_sessions is non-empty.
    blocked_sessions: []

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  # Log level: DEBUG | INFO | WARNING | ERROR
  level: "INFO"
  # Use JSON structured logs
  use_json: false
